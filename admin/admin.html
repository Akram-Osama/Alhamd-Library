<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>لوحة التحكم</title>

    <link rel="stylesheet" href="../src/admin/admin.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="logo">

            <img src="../public/images/WhatsApp_Image_2026-07-11_at_5.26.46_PM-removebg-preview.png">

            <h2>مكتبة الحمد</h2>

        </div>

        <button class="logout-btn">

            تسجيل الخروج

            <i class="fa-solid fa-right-from-bracket"></i>

        </button>

    </header>

    <!-- Page Title -->

    <section class="page-title">

        <h1>

            <i class="fa-solid fa-box-open"></i>

            إدارة المخزون

        </h1>

    </section>

    <!-- Navigation -->

    <section class="admin-nav">

        <button id="categoriesBtn" class="tab-btn active">

            <i class="fa-solid fa-layer-group"></i>

            الأقسام

        </button>

        <button id="productsBtn" class="tab-btn">

            <i class="fa-solid fa-box-open"></i>

            المنتجات

        </button>

    </section>

    <!-- Content -->

    <main class="container">

        <!-- Categories Section -->

        <div id="categoriesSection" class="page-section">

            <section class="categories-section">

                <div class="section-header">

                    <button class="add-btn" id="openModal">

                        <i class="fa-solid fa-plus"></i>

                        إضافة قسم

                    </button>

                </div>

                <div class="categories-list">

                    <!-- Category Card -->

                    <div class="category-card">

                        <div class="category-info">

                            <div class="category-icon">
                                <i class="fa-solid fa-layer-group"></i>
                            </div>

                            <div>

                                <h3>الدفاتر</h3>

                                <span>2 منتجات</span>

                            </div>

                        </div>

                        <div class="category-actions">

                            <button class="edit-btn">

                                <i class="fa-regular fa-pen-to-square"></i>

                                تعديل

                            </button>

                            <button class="delete-btn">

                                <i class="fa-regular fa-trash-can"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Category Card -->

                    <div class="category-card">

                        <div class="category-info">

                            <div class="category-icon">
                                <i class="fa-solid fa-layer-group"></i>
                            </div>

                            <div>

                                <h3>الأقلام</h3>

                                <span>3 منتجات</span>

                            </div>

                        </div>

                        <div class="category-actions">

                            <button class="edit-btn">

                                <i class="fa-regular fa-pen-to-square"></i>

                                تعديل

                            </button>

                            <button class="delete-btn">

                                <i class="fa-regular fa-trash-can"></i>

                            </button>

                        </div>

                    </div>

                </div>

                <!-- Overlay -->

                <div class="modal-overlay" id="overlay"></div>

                <!-- Add Category Modal -->

                <div class="modal" id="categoryModal">

                    <div class="modal-header">

                        <h2>إضافة قسم جديد</h2>

                        <button class="close-modal" id="closeModal">

                            <i class="fa-solid fa-xmark"></i>

                        </button>

                    </div>

                    <div class="modal-body">

                        <label>اسم القسم</label>

                        <input type="text" id="categoryName" placeholder="مثال: الدفاتر">

                    </div>

                    <div class="modal-footer">

                        <button class="cancel-btn" id="cancelBtn">

                            إلغاء

                        </button>

                        <button class="save-btn" id="saveCategory">

                            حفظ القسم

                        </button>

                    </div>

                </div>

            </section>

        </div>

        <!-- products section -->

        <div id="productsSection" class="page-section">

            <section class="products-section">

    <div class="products-toolbar">

        <div class="toolbar-right">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="searchProduct"
                    placeholder="ابحث عن منتج...">

            </div>

            <button
                class="filter-btn"
                id="filterBtn">

                <i class="fa-solid fa-filter"></i>

                فلترة

            </button>

            <button
                class="add-product-btn"
                id="addProductBtn">

                <i class="fa-solid fa-plus"></i>

                إضافة منتج

            </button>

        </div>

    </div>

    <div class="products-table">

        <table>

            <thead>

                <tr>

                    <th>الصورة</th>

                    <th>المنتج</th>

                    <th>القسم</th>

                    <th>السعر</th>

                    <th>الحالة</th>

                    <th>الإجراءات</th>

                </tr>

            </thead>

            <tbody id="productsTableBody">

                <tr>

                    <td>
                        <img src="https://placehold.co/70">
                    </td>

                    <td>دفتر سلك</td>

                    <td>الكشاكيل</td>

                    <td>45 ج.م</td>

                    <td>

                        <span class="status available">

                            متوفر

                        </span>

                    </td>

                    <td>

                        <button class="icon-btn edit">

                            <i class="fa-solid fa-pen"></i>

                        </button>

                        <button class="icon-btn delete">

                            <i class="fa-solid fa-trash"></i>

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</section>

        </div>

        <!-- Filter Overlay -->
<div class="filter-overlay" id="filterOverlay"></div>

<!-- Filter Popup -->
<div class="filter-popup" id="filterPopup">

    <div class="filter-header">

        <h2>فلترة المنتجات</h2>

        <button id="closeFilter">
            <i class="fa-solid fa-xmark"></i>
        </button>

    </div>

    <div class="filter-body">

        <label>القسم</label>

        <select id="filterCategory">

            <option value="">كل الأقسام</option>

            <option value="الكشاكيل">الكشاكيل</option>

            <option value="الأقلام">الأقلام</option>

            <option value="الأدوات الفنية">الأدوات الفنية</option>

            <option value="الأدوات الهندسية">الأدوات الهندسية</option>

            <option value="الحقائب">الحقائب</option>

        </select>

        <label>الحالة</label>

        <select id="filterAvailability">

            <option value="">الكل</option>

            <option value="available">متوفر</option>

            <option value="unavailable">غير متوفر</option>

        </select>

    </div>

    <div class="filter-footer">

        <button class="cancel-filter" id="resetFilter">
            إعادة تعيين
        </button>

        <button class="apply-filter" id="applyFilter">
            تطبيق
        </button>

    </div>

</div>

<!-- Product Overlay -->
<div class="product-overlay" id="productOverlay"></div>

<!-- Product Modal -->
<div class="product-modal" id="productModal">

    <div class="modal-header">

        <h2>إضافة منتج جديد</h2>

        <button id="closeProductModal">
            <i class="fa-solid fa-xmark"></i>
        </button>

    </div>

    <div class="modal-body">

        <!-- الصورة -->

        <label>صورة المنتج</label>

        <div class="image-upload">

            <input type="file" id="productImage" accept="image/*" hidden>

            <label for="productImage" class="upload-box" id="uploadBox">

                <img id="imagePreview" class="image-preview" alt="معاينة الصورة">
                <i class="fa-regular fa-image" id="imageIcon"></i>
                <span id="imageLabel">اختر صورة</span>

            </label>

        </div>

        <!-- الاسم -->

        <label>اسم المنتج</label>

        <input
        type="text"
        id="productName"
        placeholder="مثال : دفتر سلك">

        <!-- القسم -->

        <label>القسم</label>

        <select id="productCategory">

            <option>الكشاكيل</option>
            <option>الأقلام</option>
            <option>الأدوات الفنية</option>
            <option>الأدوات الهندسية</option>
            <option>الحقائب</option>

        </select>

        <!-- السعر -->

        <label>السعر</label>

        <input
        type="number"
        id="productPrice"
        placeholder="0">

        <!-- التوفر -->

        <div class="availability">

            <span>متوفر</span>

            <label class="switch">

                <input type="checkbox" id="productAvailability" checked>

                <span class="slider"></span>

            </label>

        </div>

    </div>

    <div class="modal-footer">

        <button class="cancel-product">
            إلغاء
        </button>

        <button class="save-product" id="saveProductBtn">
            حفظ المنتج
        </button>

    </div>

</div>

    </main>

    <script src="../src/admin/admin.js"></script>
</body>

</html>
