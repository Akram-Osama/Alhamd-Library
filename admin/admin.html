<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>لوحة التحكم</title>

    <link rel="stylesheet" href="../src/admin/admin.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>

    <!-- Header -->

    <header class="header">

        <div class="logo">

            <img src="../public/images/WhatsApp_Image_2026-07-11_at_5.26.46_PM-removebg-preview.png">

            <h2>مكتبة الحمد</h2>

        </div>

        <button class="logout-btn">

            تسجيل الخروج

            <i class="fa-solid fa-right-from-bracket"></i>

        </button>

    </header>

    <!-- Page Title -->

    <section class="page-title">

        <h1>

            <i class="fa-solid fa-box-open"></i>

            إدارة المخزون

        </h1>

    </section>

    <!-- Navigation -->

    <section class="admin-nav">

        <button class="nav-btn active">

            <i class="fa-solid fa-layer-group"></i>

            الأقسام

        </button>

        <button class="nav-btn">

            <i class="fa-solid fa-box"></i>

            المنتجات

        </button>

    </section>

    <!-- Content -->

    <main class="container">
        <!-- Categories Section -->

<section class="categories-section">

    <div class="section-header">

        <button class="add-btn" id="openModal">

    <i class="fa-solid fa-plus"></i>

    إضافة قسم

</button>

    </div>

    <div class="categories-list">

        <!-- Category Card -->

        <div class="category-card">

            <div class="category-info">

                <div class="category-icon">
                    <i class="fa-solid fa-layer-group"></i>
                </div>

                <div>

                    <h3>الدفاتر</h3>

                    <span>2 منتجات</span>

                </div>

            </div>

            <div class="category-actions">

                <button class="edit-btn">

                    <i class="fa-regular fa-pen-to-square"></i>

                    تعديل

                </button>

                <button class="delete-btn">

                    <i class="fa-regular fa-trash-can"></i>

                </button>

            </div>

        </div>

        <!-- Category Card -->

        <div class="category-card">

            <div class="category-info">

                <div class="category-icon">
                    <i class="fa-solid fa-layer-group"></i>
                </div>

                <div>

                    <h3>الأقلام</h3>

                    <span>3 منتجات</span>

                </div>

            </div>

            <div class="category-actions">

                <button class="edit-btn">

                    <i class="fa-regular fa-pen-to-square"></i>

                    تعديل

                </button>

                <button class="delete-btn">

                    <i class="fa-regular fa-trash-can"></i>

                </button>

            </div>

        </div>

    </div>

</section>
    </main>

    <!-- Overlay -->

<div class="modal-overlay" id="overlay"></div>

<!-- Add Category Modal -->

<div class="modal" id="categoryModal">

    <div class="modal-header">

        <h2>إضافة قسم جديد</h2>

        <button class="close-modal" id="closeModal">

            <i class="fa-solid fa-xmark"></i>

        </button>

    </div>

    <div class="modal-body">

        <label>اسم القسم</label>

        <input
            type="text"
            id="categoryName"
            placeholder="مثال: الدفاتر">

    </div>

    <div class="modal-footer">

        <button class="cancel-btn" id="cancelBtn">

            إلغاء

        </button>

        <button class="save-btn" id="saveCategory">

            حفظ القسم

        </button>

    </div>

</div>

</body>

</html>
